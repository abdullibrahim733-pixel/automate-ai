<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="1000" viewBox="0 0 1000 1000">
  <defs>
    <!-- Grid dots -->
    <pattern id="dot-grid" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <circle cx="30" cy="30" r="1.5" fill="#C9A84C" opacity="0.15"/>
    </pattern>
    <!-- Diagonal lines -->
    <pattern id="diagonal-lines" x="0" y="0" width="80" height="80" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="80" y2="80" stroke="#7EB8E0" stroke-width="0.3" opacity="0.08"/>
    </pattern>
    <!-- Glows -->
    <radialGradient id="glow-gold" cx="30%" cy="40%" r="40%">
      <stop offset="0%" stop-color="#C9A84C" stop-opacity="0.08"/>
      <stop offset="60%" stop-color="#C9A84C" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#C9A84C" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-blue" cx="70%" cy="50%" r="35%">
      <stop offset="0%" stop-color="#7EB8E0" stop-opacity="0.08"/>
      <stop offset="60%" stop-color="#7EB8E0" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#7EB8E0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-olive" cx="50%" cy="80%" r="30%">
      <stop offset="0%" stop-color="#5C7A3A" stop-opacity="0.06"/>
      <stop offset="60%" stop-color="#5C7A3A" stop-opacity="0.015"/>
      <stop offset="100%" stop-color="#5C7A3A" stop-opacity="0"/>
    </radialGradient>
    <!-- Abstract arc shapes -->
    <filter id="blur-soft">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1000" height="1000" fill="#0C0C0C"/>

  <!-- Glow layers -->
  <rect width="1000" height="1000" fill="url(#glow-gold)"/>
  <rect width="1000" height="1000" fill="url(#glow-blue)"/>
  <rect width="1000" height="1000" fill="url(#glow-olive)"/>

  <!-- Grid dots -->
  <rect width="1000" height="1000" fill="url(#dot-grid)" opacity="0.8"/>

  <!-- Diagonal tech lines -->
  <rect width="1000" height="1000" fill="url(#diagonal-lines)" opacity="0.7"/>

  <!-- Abstract flowing curves (gold) -->
  <g filter="url(#blur-soft)" opacity="0.12">
    <path d="M-100,200 Q200,100 400,250 T800,200 T1100,300" stroke="#C9A84C" stroke-width="2" fill="none"/>
    <path d="M-50,500 Q250,350 500,450 T900,400 T1150,550" stroke="#C9A84C" stroke-width="1.5" fill="none"/>
    <path d="M-150,750 Q150,600 450,700 T950,650 T1200,800" stroke="#C9A84C" stroke-width="1" fill="none"/>
  </g>

  <!-- Abstract flowing curves (blue) -->
  <g filter="url(#blur-soft)" opacity="0.1">
    <path d="M-50,300 Q200,450 450,350 T850,450 T1150,350" stroke="#7EB8E0" stroke-width="1.5" fill="none"/>
    <path d="M-100,600 Q300,750 550,600 T1000,700 T1200,600" stroke="#7EB8E0" stroke-width="1" fill="none"/>
  </g>

  <!-- Subtle node connections (circuit-like) -->
  <g stroke="#C9A84C" stroke-width="0.5" opacity="0.08">
    <!-- Horizontal data lines -->
    <line x1="50" y1="120" x2="180" y2="120"/>
    <line x1="180" y1="120" x2="180" y2="200"/>
    <line x1="180" y1="200" x2="320" y2="200"/>
    <line x1="700" y1="350" x2="850" y2="350"/>
    <line x1="850" y1="350" x2="850" y2="450"/>
    <line x1="850" y1="450" x2="950" y2="450"/>
    <line x1="200" y1="650" x2="200" y2="750"/>
    <line x1="200" y1="750" x2="380" y2="750"/>
    <line x1="600" y1="150" x2="600" y2="280"/>
    <line x1="600" y1="280" x2="780" y2="280"/>
  </g>

  <!-- Nodes (dots at connection points) -->
  <g fill="#C9A84C" opacity="0.12">
    <circle cx="50" cy="120" r="3"/>
    <circle cx="180" cy="120" r="2"/>
    <circle cx="320" cy="200" r="2"/>
    <circle cx="700" cy="350" r="2"/>
    <circle cx="850" cy="350" r="3"/>
    <circle cx="950" cy="450" r="2"/>
    <circle cx="200" cy="750" r="3"/>
    <circle cx="380" cy="750" r="2"/>
    <circle cx="600" cy="280" r="2"/>
    <circle cx="780" cy="280" r="2"/>
  </g>

  <!-- Subtle floating dots -->
  <g fill="#7EB8E0" opacity="0.06">
    <circle cx="150" cy="400" r="4"/>
    <circle cx="420" cy="180" r="2.5"/>
    <circle cx="830" cy="600" r="3.5"/>
    <circle cx="300" cy="550" r="2"/>
    <circle cx="750" cy="130" r="3"/>
    <circle cx="920" cy="800" r="2"/>
    <circle cx="80" cy="850" r="2.5"/>
    <circle cx="550" cy="900" r="3"/>
  </g>
</svg>
